name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 02:00 UTC — runs cluster-install and quickstart jobs
    - cron: '0 2 * * *'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go mod verify
        run: go mod verify
      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - uses: azure/setup-helm@v4
        with:
          version: v3.17.3
      - name: helm lint
        run: helm lint deploy/helm/forge/
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
      - name: terraform fmt check
        run: |
          terraform -chdir=deploy/terraform/aws fmt -check -recursive
          terraform -chdir=deploy/terraform/gcp fmt -check -recursive
      - name: terraform validate (aws)
        run: |
          terraform -chdir=deploy/terraform/aws init -backend=false
          terraform -chdir=deploy/terraform/aws validate
      - name: terraform validate (gcp)
        run: |
          terraform -chdir=deploy/terraform/gcp init -backend=false
          terraform -chdir=deploy/terraform/gcp validate

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests (race detector + coverage)
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...
      - name: Coverage gate
        run: |
          TOTAL=$(go tool cover -func=coverage.out | awk '/^total:/{print $NF}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          # Gate starts lenient; ratchet up as format handlers gain HTTP tests.
          # Target per workplan: overall ≥75%, core packages ≥85%.
          awk -v t="$TOTAL" 'BEGIN { if (t+0 < 35) { print "FAIL: " t "% is below the 35% gate"; exit 1 } }'
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run integration tests
        run: go test -tags integration -race -timeout 300s -v ./internal/blob/... ./internal/meta/... ./internal/testutil/...

  conformance:
    name: Conformance tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: npm conformance (proxy + hosted)
        run: go test -tags conformance -timeout 600s -v ./internal/conformance/...

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (PR — no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64
          tags: forge:ci

  publish:
    name: Publish image + chart
    # Only runs on pushes to main or version tags; never on PRs.
    if: github.event_name == 'push'
    needs: [lint, test, integration]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    steps:
      - uses: actions/checkout@v4

      # ── Docker image ────────────────────────────────────────────────────────
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/forge
          tags: |
            # tag :latest on every push to main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # tag :vX.Y.Z on version tags
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # always include a short SHA for traceability
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Helm chart ──────────────────────────────────────────────────────────
      - uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Log Helm into GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io \
                --username "${{ github.actor }}" \
                --password-stdin

      - name: Package and push chart
        run: |
          helm package deploy/helm/forge/
          helm push forge-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

  cluster-install:
    name: Cluster install test (kind)
    # Run on push to main and nightly; skip on PRs to keep them fast.
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Build the forge image for amd64 only (kind is always amd64).
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          platforms: linux/amd64
          tags: forge:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Spin up a single-node kind cluster.
      - uses: helm/kind-action@v1
        with:
          cluster_name: forge-test
          version: v0.23.0

      # Load the locally-built image into the kind node (no registry needed).
      - name: Load image into kind
        run: kind load docker-image forge:ci --name forge-test

      - uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      # Install forge using FS storage (PVC backed by kind's local-path provisioner).
      - name: helm install forge
        run: |
          helm install forge deploy/helm/forge \
            --set image.repository=forge \
            --set image.tag=ci \
            --set image.pullPolicy=Never \
            --wait --timeout 3m

      # Verify liveness and readiness probes are wired correctly.
      - name: Assert probes
        run: |
          kubectl get pods -l app.kubernetes.io/name=forge -o wide
          kubectl wait --for=condition=Ready pod -l app.kubernetes.io/name=forge --timeout=60s

      # Port-forward and run the smoke test against the cluster.
      - name: Run smoke test
        run: |
          kubectl port-forward svc/forge 8080:8080 &
          sleep 2
          go build -o ./forge ./cmd/forge
          FORGE_BASE=http://localhost:8080 bash test.sh

      # Confirm graceful drain: delete the pod while a request is in flight.
      - name: Assert graceful drain
        run: |
          # Fire a background sleep request (no such endpoint — will 404 fast, but
          # the important thing is that the pod terminates cleanly with exit 0).
          kubectl delete pod -l app.kubernetes.io/name=forge --wait=true
          # Helm will recreate the pod; wait for it to be ready again.
          kubectl wait --for=condition=Ready pod -l app.kubernetes.io/name=forge --timeout=60s

  quickstart:
    name: Quickstart gate (< 10 min, eval path)
    # Run nightly only — docker compose build is slow and not worth blocking PRs.
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Timed quickstart
        run: |
          START=$(date +%s)

          # Step 1: bring up the eval stack (builds the image from scratch).
          docker compose up -d --build --wait

          # Step 2: first successful publish (npm, the simplest client).
          printf 'tarball-bytes' > /tmp/pkg.tgz
          B64=$(base64 -w0 /tmp/pkg.tgz)
          curl -sf -X PUT -H "Content-Type: application/json" \
            http://localhost:8080/repository/npm-hosted/quickstart-pkg \
            -d "{
              \"name\":\"quickstart-pkg\",
              \"versions\":{\"1.0.0\":{\"name\":\"quickstart-pkg\",\"version\":\"1.0.0\",\"dist\":{\"shasum\":\"abc\"}}},
              \"dist-tags\":{\"latest\":\"1.0.0\"},
              \"_attachments\":{\"quickstart-pkg-1.0.0.tgz\":{\"content_type\":\"application/octet-stream\",\"data\":\"$B64\"}}
            }"

          END=$(date +%s)
          ELAPSED=$((END - START))
          echo "Quickstart completed in ${ELAPSED}s (gate: 600s)"
          if [ "$ELAPSED" -gt 600 ]; then
            echo "FAIL: ${ELAPSED}s exceeds 600s gate"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: docker compose down -v
