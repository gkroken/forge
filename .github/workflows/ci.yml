name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 02:00 UTC — runs cluster-install and quickstart jobs
    - cron: '0 2 * * *'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go mod verify
        run: go mod verify
      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - uses: azure/setup-helm@v4
        with:
          version: v3.17.3
      - name: helm lint
        run: helm lint deploy/helm/forge/
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
      - name: terraform fmt check
        run: |
          terraform -chdir=deploy/terraform/aws fmt -check -recursive
          terraform -chdir=deploy/terraform/gcp fmt -check -recursive
      - name: terraform validate (aws)
        run: |
          terraform -chdir=deploy/terraform/aws init -backend=false
          terraform -chdir=deploy/terraform/aws validate
      - name: terraform validate (gcp)
        run: |
          terraform -chdir=deploy/terraform/gcp init -backend=false
          terraform -chdir=deploy/terraform/gcp validate

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests (race detector + coverage)
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...
      - name: Coverage gate
        run: |
          TOTAL=$(go tool cover -func=coverage.out | awk '/^total:/{print $NF}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          awk -v t="$TOTAL" 'BEGIN { if (t+0 < 75) { print "FAIL: " t "% is below the 75% gate"; exit 1 } }'

          # Per-package ≥85% gate for packages fully exercisable without containers.
          # blob/meta/queue have integration-only backends (s3store, pgstore, pg.go)
          # that are correctly at 0% here and covered by the integration CI job.
          # Format handlers are judged by conformance, not line coverage (§5.10).
          FAIL=0
          for PKG in \
            forge/internal/auth \
            forge/internal/proxy \
            forge/internal/indexer \
            forge/internal/server; do
            PCT=$(go tool cover -func=coverage.out \
              | awk -v p="$PKG/" '$1 ~ p {sum+=$3; n++} END {if(n>0) printf "%.1f", sum/n}' \
              | tr -d '%')
            echo "  ${PKG##*/}: ${PCT}%"
            awk -v pkg="${PKG##*/}" -v pct="$PCT" \
              'BEGIN { if (pct+0 < 85) { print "FAIL: " pkg " is at " pct "% (gate: 85%)"; exit 1 } }' \
              || FAIL=1
          done
          exit $FAIL
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run integration tests
        run: go test -tags integration -race -timeout 300s -v ./internal/blob/... ./internal/meta/... ./internal/testutil/...

  conformance:
    name: Conformance tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: npm conformance (proxy + hosted)
        run: go test -tags conformance -timeout 600s -v ./internal/conformance/...

  security:
    name: Security scan (SAST + deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # gosec: SAST for common Go security issues (G-series rules).
      # -severity medium catches SQL injection, path traversal, weak crypto, etc.
      # Suppress individual findings only with audited #nosec comments in source.
      - name: gosec (SAST)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -severity medium -confidence medium -quiet ./...
      # govulncheck: reports only vulnerabilities reachable from our call graph,
      # so indirect deps that are imported but never called don't fail the build.
      - name: govulncheck (dependency scan)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  docker:
    name: Docker image build + container scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (PR — no push)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          # Trivy runs locally so load the amd64 image into the Docker daemon.
          load: true
          platforms: linux/amd64
          tags: forge:ci
      # Trivy: scan the built image for OS + application CVEs.
      # ignore-unfixed: skip vulns with no available fix (base image distro issues
      # we cannot resolve); still catches fixable High/Critical in our deps.
      - name: Trivy container scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: forge:ci
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  publish:
    name: Publish image + chart
    # Only runs on pushes to main or version tags; never on PRs.
    if: github.event_name == 'push'
    needs: [lint, test, integration, security]
    runs-on: ubuntu-latest
    permissions:
      contents: write      # upload release assets (SBOMs)
      packages: write      # push image + chart to GHCR
      id-token: write      # cosign keyless signing (OIDC token exchange)
      attestations: write  # attach SBOM attestation to image

    steps:
      - uses: actions/checkout@v4

      # ── Docker image ────────────────────────────────────────────────────────
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/forge
          tags: |
            # tag :latest on every push to main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # tag :vX.Y.Z on version tags
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # always include a short SHA for traceability
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Helm chart ──────────────────────────────────────────────────────────
      - uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Log Helm into GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io \
                --username "${{ github.actor }}" \
                --password-stdin

      - name: Package and push chart
        run: |
          helm package deploy/helm/forge/
          helm push forge-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

      # ── SBOM ──────────────────────────────────────────────────────────────
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      # Source SBOM: walks the Go module graph (go.mod / go.sum) so the full
      # dependency tree is captured, not just what ended up in the binary.
      - name: Generate source SBOM
        run: |
          syft scan . \
            --source-name forge \
            --output spdx-json=sbom-source.spdx.json

      # Image SBOM: scans the pushed multi-arch manifest by digest so the result
      # is tied to an immutable reference, not a mutable tag.
      - name: Generate image SBOM
        run: |
          syft scan \
            ghcr.io/${{ github.repository_owner }}/forge@${{ steps.build.outputs.digest }} \
            --output spdx-json=sbom-image.spdx.json

      # ── Signing ───────────────────────────────────────────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Keyless signing: exchanges the GitHub Actions OIDC token for a
      # short-lived Sigstore certificate; records in the Rekor transparency
      # log. No long-lived private key is stored in the repo.
      - name: Sign image
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository_owner }}/forge@${{ steps.build.outputs.digest }}

      # Verify immediately after signing as a CI self-check. End users should
      # run this command when pulling from GHCR.
      - name: Verify image signature
        run: |
          cosign verify \
            --certificate-identity-regexp \
              "https://github.com/${{ github.repository }}/.github/workflows/ci.yml@refs/.*" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            ghcr.io/${{ github.repository_owner }}/forge@${{ steps.build.outputs.digest }} \
            | jq '.[0] | {subject: .critical.identity, issuer: .optional.Issuer}'

      # ── Release assets ────────────────────────────────────────────────────
      # Attach both SBOMs to the GitHub release. Only runs on vX.Y.Z tags;
      # skipped on plain pushes to main where no release object exists.
      - name: Attach SBOMs to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sbom-source.spdx.json
            sbom-image.spdx.json

  cluster-install:
    name: Cluster install test (kind)
    # Run on push to main and nightly; skip on PRs to keep them fast.
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Build the forge image for amd64 only (kind is always amd64).
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          platforms: linux/amd64
          tags: forge:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Spin up a single-node kind cluster.
      - uses: helm/kind-action@v1
        with:
          cluster_name: forge-test
          version: v0.23.0

      # Load the locally-built image into the kind node (no registry needed).
      - name: Load image into kind
        run: kind load docker-image forge:ci --name forge-test

      - uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      # Install forge using FS storage (PVC backed by kind's local-path provisioner).
      - name: helm install forge
        run: |
          helm install forge deploy/helm/forge \
            --set image.repository=forge \
            --set image.tag=ci \
            --set image.pullPolicy=Never \
            --wait --timeout 3m

      # Verify liveness and readiness probes are wired correctly.
      - name: Assert probes
        run: |
          kubectl get pods -l app.kubernetes.io/name=forge -o wide
          kubectl wait --for=condition=Ready pod -l app.kubernetes.io/name=forge --timeout=60s

      # Build the forge binary (needed only as a path; FORGE_BASE means test.sh
      # won't start it — the binary just needs to exist for the trap to be set).
      - name: Build forge binary
        run: go build -o ./forge ./cmd/forge

      # Port-forward and run the smoke test against the cluster.
      - name: Run smoke test (standalone chart)
        run: |
          kubectl port-forward svc/forge 8080:8080 &
          PF_PID=$!
          sleep 2
          FORGE_BASE=http://localhost:8080 bash test.sh
          kill $PF_PID 2>/dev/null || true

      # Confirm graceful drain: delete the pod and assert it restarts cleanly.
      - name: Assert graceful drain
        run: |
          kubectl delete pod -l app.kubernetes.io/name=forge --wait=true
          kubectl wait --for=condition=Ready pod -l app.kubernetes.io/name=forge --timeout=60s

      # ── forge-stack (production on-prem path) ───────────────────────────────
      - name: helm dep update (forge-stack)
        run: helm dependency update deploy/helm/forge-stack/

      - name: helm install forge-stack
        run: |
          helm install forge-stack deploy/helm/forge-stack \
            --set forge.image.repository=forge \
            --set forge.image.tag=ci \
            --set forge.image.pullPolicy=Never \
            --wait --timeout 5m

      - name: Run smoke test (forge-stack)
        run: |
          kubectl port-forward svc/forge-stack-forge 8080:8080 &
          PF_PID=$!
          sleep 2
          FORGE_BASE=http://localhost:8080 bash test.sh
          kill $PF_PID 2>/dev/null || true

  quickstart:
    name: Quickstart gate (< 10 min, eval path)
    # Run nightly only — docker compose build is slow and not worth blocking PRs.
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Timed quickstart
        run: |
          START=$(date +%s)

          # Step 1: bring up the eval stack (builds the image from scratch).
          docker compose up -d --build --wait

          # Step 2: first successful publish (npm, the simplest client).
          printf 'tarball-bytes' > /tmp/pkg.tgz
          B64=$(base64 -w0 /tmp/pkg.tgz)
          curl -sf -X PUT -H "Content-Type: application/json" \
            http://localhost:8080/repository/npm-hosted/quickstart-pkg \
            -d "{
              \"name\":\"quickstart-pkg\",
              \"versions\":{\"1.0.0\":{\"name\":\"quickstart-pkg\",\"version\":\"1.0.0\",\"dist\":{\"shasum\":\"abc\"}}},
              \"dist-tags\":{\"latest\":\"1.0.0\"},
              \"_attachments\":{\"quickstart-pkg-1.0.0.tgz\":{\"content_type\":\"application/octet-stream\",\"data\":\"$B64\"}}
            }"

          END=$(date +%s)
          ELAPSED=$((END - START))
          echo "Quickstart completed in ${ELAPSED}s (gate: 600s)"
          if [ "$ELAPSED" -gt 600 ]; then
            echo "FAIL: ${ELAPSED}s exceeds 600s gate"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: docker compose down -v

  dast:
    name: DAST — ZAP baseline scan
    # Nightly only: ZAP takes 3–5 minutes and is not worth blocking PRs.
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build and start forge in eval mode (FS storage, no external deps).
      - name: Start forge
        run: docker compose up -d --build --wait

      # Seed one npm packument so ZAP has repository endpoints to spider.
      - name: Seed test data
        run: |
          B64=$(printf 'dast-tarball' | base64 -w0)
          curl -sf -X PUT -H "Content-Type: application/json" \
            http://localhost:8080/repository/npm-hosted/dast-test-pkg \
            -d "{
              \"name\":\"dast-test-pkg\",
              \"versions\":{\"1.0.0\":{\"name\":\"dast-test-pkg\",\"version\":\"1.0.0\",\"dist\":{\"shasum\":\"abc\"}}},
              \"dist-tags\":{\"latest\":\"1.0.0\"},
              \"_attachments\":{\"dast-test-pkg-1.0.0.tgz\":{\"content_type\":\"application/octet-stream\",\"data\":\"$B64\"}}
            }"

      # ZAP baseline (passive) scan. Spiders the target, then runs passive
      # rules. fails the build on any WARN-level (Medium+) finding.
      # .zap/rules.tsv suppresses rules that are N/A for forge (see file for
      # rationale). The HTML + JSON reports are uploaded as artifacts.
      - name: ZAP baseline scan
        uses: zaproxy/action-baseline-scan@v0.12.0
        with:
          target: 'http://localhost:8080'
          rules_file_name: '.zap/rules.tsv'
          fail_action: true
          allow_issue_writing: false
          artifact_name: 'zap-baseline-report'
          cmd_options: '-a'   # enable Ajax Spider for htmx UI discovery

      - name: Stop forge
        if: always()
        run: docker compose down -v

  load:
    name: Load test — k6 smoke (SLO gate)
    # Nightly only: the 3-minute smoke test is fast but not worth blocking PRs
    # with the docker compose build time.
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start forge
        run: docker compose up -d --build --wait

      # Install k6 from the official Grafana package repository.
      - name: Install k6
        run: |
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq
          sudo apt-get install -y k6

      # Run the smoke load test. k6 exits non-zero if any threshold fails,
      # which makes this step fail the CI job automatically.
      # Thresholds (load/smoke.js):
      #   metadata_get p99 < 50ms  (§6 SLO)
      #   concurrent_publish error rate == 0  (50 parallel publishes, no loss)
      #   index_verify checks == 100%  (all 50 packuments readable afterward)
      - name: Run k6 smoke test
        run: FORGE_BASE=http://localhost:8080 k6 run load/smoke.js

      - name: Stop forge
        if: always()
        run: docker compose down -v
