apiVersion: v2
name: forge-stack
description: >
  Complete forge deployment for on-premises Kubernetes. Bundles forge,
  PostgreSQL (meta store), and MinIO (S3-compatible blob store) — no
  external services required beyond a Kubernetes cluster.
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - artifact-repository
  - on-premises
maintainers:
  - name: forge maintainers

dependencies:
  # Local forge chart — run `helm dependency update` to package it.
  - name: forge
    version: "0.1.0"
    repository: "file://../forge"

  # Bitnami PostgreSQL — schema migrations run automatically on forge startup.
  # Uses chart >=18.0.0 which pins tag: latest (all versioned Bitnami tags were
  # removed from Docker Hub; only :latest survives).
  - name: postgresql
    version: ">=18.0.0 <19.0.0"
    repository: "https://charts.bitnami.com/bitnami"

  # MinIO is bundled as a built-in template (see templates/minio.yaml) using the
  # official minio/minio image. The bitnami/minio sub-chart is not used because
  # Bitnami removed all versioned tags from Docker Hub.
