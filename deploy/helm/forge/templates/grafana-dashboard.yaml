{{- if .Values.grafana.dashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "forge.fullname" . }}-dashboard
  labels:
    {{- include "forge.labels" . | nindent 4 }}
    {{- with .Values.grafana.dashboard.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    grafana_dashboard: "1"
  {{- with .Values.grafana.dashboard.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  forge-overview.json: |
    {{- .Files.Get "dashboards/forge-overview.json" | nindent 4 }}
{{- end }}
