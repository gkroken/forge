<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} — forge</title>
  <link rel="stylesheet" href="/ui/static/style.css?v={{cssVer}}">
  <script src="/ui/static/theme.js"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js" defer></script>
</head>
<body class="admin-body">
<div class="admin-shell">

  <!-- ── sidebar ────────────────────────────────────────────────────────── -->
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo"><span class="ms" style="font-size:18px;">deployed_code</span></div>
      <span class="sidebar-appname">forge</span>
      <span class="sidebar-badge">eval</span>
    </div>

    <div class="sidebar-section">Manage</div>

    <nav class="sidebar-nav">
      {{$p := .ActiveNav}}
      <a href="/ui/dashboard"              class="sidebar-nav-item{{if eq $p "dashboard"}}    active{{end}}"><span class="ms sidebar-nav-icon">dashboard</span>Dashboard</a>
      <a href="/ui/admin/"                 class="sidebar-nav-item{{if eq $p "repos"}}         active{{end}}"><span class="ms sidebar-nav-icon">inventory_2</span>Repositories</a>
      <a href="/ui/browse"                 class="sidebar-nav-item{{if eq $p "browse"}}        active{{end}}"><span class="ms sidebar-nav-icon">folder_open</span>Browse</a>
      <a href="/ui/search"                 class="sidebar-nav-item{{if eq $p "search"}}        active{{end}}"><span class="ms sidebar-nav-icon">search</span>Search</a>
      <a href="/ui/admin/tokens"           class="sidebar-nav-item{{if eq $p "tokens"}}        active{{end}}"><span class="ms sidebar-nav-icon">key</span>Tokens &amp; Access</a>
      <a href="/ui/admin/cleanup-policies" class="sidebar-nav-item{{if eq $p "cleanup"}}       active{{end}}"><span class="ms sidebar-nav-icon">cleaning_services</span>Cleanup</a>
      <a href="/ui/admin/webhooks"         class="sidebar-nav-item{{if eq $p "webhooks"}}      active{{end}}"><span class="ms sidebar-nav-icon">webhook</span>Webhooks</a>
      <a href="/ui/admin/observability"    class="sidebar-nav-item{{if eq $p "observability"}} active{{end}}"><span class="ms sidebar-nav-icon">monitoring</span>Observability</a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-avatar">A</div>
      <div class="sidebar-user">
        <span class="sidebar-username">admin</span>
        <span class="sidebar-userrole">administrator</span>
      </div>
      <form method="POST" action="/ui/logout" style="margin-left:auto">
        <button type="submit" style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--text-muted);padding:2px 4px;">Sign out</button>
      </form>
    </div>
  </aside>

  <!-- ── main ───────────────────────────────────────────────────────────── -->
  <div class="admin-main">
    <div class="admin-topbar">
      <span class="admin-topbar-title">{{.Title}}</span>
      <form action="/ui/search" method="get" class="topbar-search" role="search" hx-boost="true">
        <span class="ms topbar-search-icon">search</span>
        <input type="search" name="q" class="topbar-search-input" autocomplete="off"
               placeholder="Search repositories &amp; artifacts"
               value="{{if eq .Title "Search"}}{{.Query}}{{end}}">
      </form>
      <div class="topbar-icon-group">
        <button class="topbar-icon-btn" type="button" title="Notifications"><span class="ms">notifications</span></button>
        <button class="topbar-icon-btn" type="button" title="Help"><span class="ms">help</span></button>
      </div>
    </div>
    <div class="{{block "content-class" .}}admin-content{{end}}">
      {{block "content" .}}{{end}}
    </div>
  </div>

</div>
</body>
</html>
