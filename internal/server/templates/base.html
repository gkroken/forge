<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} — forge</title>
  <link rel="stylesheet" href="/ui/static/style.css?v={{cssVer}}">
  <script src="/ui/static/theme.js"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js" defer></script>
</head>
<body>
  <nav>
    <a href="/ui/" class="brand"><span class="brand-mark">f</span>forge</a>
    <form action="/ui/search" method="get" class="nav-search" hx-boost="true">
      <input type="search" name="q" placeholder="Search repositories…" autocomplete="off"
             value="{{if eq .Title "Search"}}{{.Query}}{{end}}">
    </form>
    <div class="nav-end">
      <a href="/ui/admin/" class="nav-link">Admin</a>
      <button id="theme-toggle" class="nav-btn">Dark mode</button>
      <form method="POST" action="/ui/logout">
        <button type="submit" class="nav-btn">Sign out</button>
      </form>
    </div>
  </nav>
  <main>
    {{block "content" .}}{{end}}
  </main>
</body>
</html>
