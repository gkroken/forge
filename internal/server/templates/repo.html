{{define "content"}}
<div class="browse-shell" data-repo="{{.Repo.Name}}">

  <!-- ── Left: package list ───────────────────────────────────────────────── -->
  <div class="browse-left">
    <div class="browse-pane-hdr">
      <span class="badge fmt-{{.Repo.Format}} fmt-mono" style="font-size:11px">{{formatIcon .Repo.Format}}{{.Repo.Format}}</span>
      <span class="browse-repo-name">{{.Repo.Name}}</span>
      {{if eq .Repo.Kind "hosted"}}<a href="/ui/repos/{{.Repo.Name}}/upload" class="btn btn-sm" style="margin-left:auto">↑</a>{{end}}
    </div>
    <div class="browse-search-wrap">
      <input type="search" id="pkg-search" placeholder="Filter packages…" autocomplete="off">
    </div>
    <div id="pkg-list" class="browse-item-list">
      <div class="browse-msg">Loading…</div>
    </div>
  </div>

  <!-- ── Center: version list ─────────────────────────────────────────────── -->
  <div class="browse-center" id="center-pane">
    <div class="browse-placeholder">
      <span class="ms" style="font-size:40px;color:var(--text-muted)">inventory_2</span>
      <p>Select a package to view versions.</p>
    </div>
  </div>

  <!-- ── Right: asset detail ──────────────────────────────────────────────── -->
  <div class="browse-right" id="detail-pane">
    <div class="browse-placeholder">
      <span class="ms" style="font-size:40px;color:var(--text-muted)">info</span>
      <p>Select a version.</p>
    </div>
  </div>

</div>
<script src="/ui/static/browse.js"></script>
{{end}}
